- title: Personalized Cardiovascular Modeling
  subtitle: Toward predictive medicine
  group: featured
  image: images/photo.jpg
  link: research/cv-modeling
  description: We are building patient-specific biophysical models of the cardiovascular system, derived from medical imaging data.
  repo: greenelab/lab-website-template
