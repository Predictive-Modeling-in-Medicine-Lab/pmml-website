    - modeling

- title: Lung Digital Twins 
  subtitle: 
  group: featured
  image: images/Research/Lung_DT_ResearchFig_Nov2025_1.jpg
  link: https://github.com/
  description: > 
    We are developing methods to create biomedical digital twins using lung models 
    with data from medical imaging to improve the understanding of rare lung diseases, like 
    Idiopathic Pulmonary Fibrosis, as well as related and more common conditions, like Pulmonary Arterial Hypertension,
     that will help clinicians with diagnosis, treatment selection, and clinical management.
  repo: greenelab/lab-website-template
  tags:
    - pulmonary 
    - modeling

